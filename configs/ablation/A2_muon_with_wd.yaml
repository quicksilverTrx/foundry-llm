# A2: Add weight decay to Muon — the primary fix
# Same as A1 except weight_decay=0.1 is now applied to Muon params too.
probe_name: A2_muon_with_wd

max_steps:    1500
batch_size:   8
grad_accum:   16
block_size:   4096
warmup_steps: 500
val_every:    500
val_steps:    300
seed:         42
torch_compile: true

arch:
  attention_type: gqa
  num_kv_heads:   4
  n_heads:        16
  mlp_type:       swiglu
  norm_type:      rmsnorm
  pos_encoding_type: rope
  rope_fraction:  0.5
  n_value_embeds: 2
  use_x0_mixin:   true
  qk_norm:        true
  tie_weights:    false

optimizer:
  type:          muon_adam
  muon_lr:       0.02
  adam_lr:       0.0006
  weight_decay:  0.1       # THE FIX
  muon_momentum: 0.95
