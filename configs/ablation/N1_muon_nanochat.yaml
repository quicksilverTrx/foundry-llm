# N1: Full Stack + Muon (nanochat recipe)
#
# Question: Does the full v2 architecture + nanochat Muon recipe work?
#           Target: beat baseline (val < 3.3566 at equivalent tokens).
#
# Architecture: v2 (GQA + SwiGLU + RMSNorm + RoPE(50%) + x0-mixin + VE + softcap=30)
# Optimizer:    Muon + 4 Adam groups (nanochat recipe)
# Schedule:     constant + warmdown (last 40% of 9537 steps)
#
# CRITICAL: run_steps=1500, max_steps=9537.
# At step 1500, LR is at 100% peak (warmdown starts at step 5722).
probe_name: N1_muon_nanochat

max_steps:        9537     # full 5B-token production schedule (for LR computation)
run_steps:        1500     # actual probe execution steps (~0.79B tokens)
batch_size:       16
grad_accum:       32
block_size:       1024
warmup_steps:     100      # ~1% of 9537 steps
warmdown_ratio:   0.4      # warmdown starts at step floor(9537 * 0.6) = 5722
val_every:        500
val_steps:        300
seed:             42
torch_compile:    true

optimizer:
  type:          muon_adam
  muon_lr:       0.02
  embed_lr:      0.3       # 50× higher than default — validated in nanochat (320 exps)
  unembed_lr:    0.004
  scalar_lr:     0.5       # x0_lambda / x0_lambda0 scalars
  adam_lr:       6e-4      # default Adam group (norms, biases, value_embed)
  weight_decay:  0.2       # Muon 2D weights only; all Adam groups WD=0.0
                           # Note: nanochat scales WD by (12/depth)^2 for all depths.
                           # At depth=8 that gives 0.45 — too aggressive.
                           # Using 0.2 unscaled per user guidance.

arch:
  rope_fraction:  0.5      # Partial RoPE (v2)
  n_value_embeds: 2        # per-layer value-embedding biases (v2)
  use_x0_mixin:   true     # residual mixing x = λ·x + λ₀·x₀ (v2)
