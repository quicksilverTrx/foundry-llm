# N3: Base Architecture + Muon (nanochat recipe)
#
# Question: Do the v2 architectural components (Partial RoPE, value embeddings,
#           x0-mixin) actually help when combined with Muon?
#           Isolates component contribution by holding optimizer constant.
#
# Architecture: v1 base (full RoPE, no value embeddings, no x0-mixin)
# Optimizer:    Muon + 4 Adam groups (SAME nanochat recipe as N1)
# Schedule:     constant + warmdown (same as N1)
#
# Decision matrix:
#   N1 < N3  →  components help with Muon. Keep them.
#   N3 < N1  →  components hurt with Muon. Drop them.
#   N1 ≈ N3  →  components neutral. Keep for novelty.
#
# Note: N3 is NOT a v1 reproduction (that uses AdamW).
#       N3 answers: "does Muon + base arch ≥ Muon + new components?"
#       The missing cell (v1 arch + AdamW) is already known: val=3.3566 at 2.5B tokens.
#
# With use_x0_mixin=false, the x0_lambda / x0_lambda0 parameters don't exist.
# The scalar Adam group will be empty — AdamW handles this gracefully.
probe_name: N3_base_arch_muon

max_steps:        9537
run_steps:        1500
batch_size:       16
grad_accum:       32
block_size:       1024
warmup_steps:     100
warmdown_ratio:   0.4
val_every:        500
val_steps:        300
seed:             42
torch_compile:    true

optimizer:
  type:          muon_adam
  muon_lr:       0.02
  embed_lr:      0.3
  unembed_lr:    0.004
  scalar_lr:     0.5
  adam_lr:       6e-4
  weight_decay:  0.2

arch:
  rope_fraction:  1.0      # v1 arch: full RoPE
  n_value_embeds: 0        # v1 arch: no value-embedding biases
  use_x0_mixin:   false    # v1 arch: standard residual (no x0-mixin scalars)
