# D2: MHA + ReLU² + Muon + WD=0.1
# Same as D1 but with weight decay applied to Muon params.
# Tests whether WD helps MHA+ReLU² the same way it helps GQA+SwiGLU.
probe_name: D2_mha_relu2_muon_wd

max_steps:    1500
batch_size:   8
grad_accum:   16
block_size:   4096
warmup_steps: 500
val_every:    500
val_steps:    300
seed:         42
torch_compile: true

arch:
  attention_type: mha
  num_kv_heads:   16
  n_heads:        16
  mlp_type:       relu_squared
  d_ff:           3320      # same as D1 for fair comparison
  norm_type:      rmsnorm
  pos_encoding_type: rope
  rope_fraction:  0.5
  n_value_embeds: 2
  use_x0_mixin:   true
  qk_norm:        true
  tie_weights:    false

optimizer:
  type:          muon_adam
  muon_lr:       0.02
  adam_lr:       0.0006
  weight_decay:  0.1        # WD added vs D1
  muon_momentum: 0.95
