# C2: Base NanoLlama-at-350M + pure AdamW
# Same arch as C1 (full RoPE, no extra components), pure AdamW optimizer.
# Tests: does the base architecture prefer Muon or AdamW?
probe_name: C2_base_adamw

max_steps:    1500
batch_size:   8
grad_accum:   16
block_size:   4096
warmup_steps: 500
val_every:    500
val_steps:    300
seed:         42
torch_compile: true

arch:
  attention_type: gqa
  num_kv_heads:   4
  n_heads:        16
  mlp_type:       swiglu
  norm_type:      rmsnorm
  pos_encoding_type: rope
  rope_fraction:  1.0       # FULL RoPE
  n_value_embeds: 0         # NO value embeds
  use_x0_mixin:   false     # NO x0-mixin
  qk_norm:        true
  tie_weights:    false

optimizer:
  type:         adamw
  adam_lr:      0.0006
  weight_decay: 0.1
